<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1580" viewBox="0 0 1200 1580" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <style>
      .stage { stroke-width: 2; }
      .det { fill: #eff6ff; stroke: #2563eb; }
      .io { fill: #fffbeb; stroke: #f59e0b; }
      .router { fill: #f0fdfa; stroke: #0d9488; }
      .llm { fill: #f5f3ff; stroke: #7c3aed; }
      .intel { fill: #ecfdf5; stroke: #059669; }
      .lbl { font-size: 17px; fill: #0f172a; font-weight: 600; }
      .sub { font-size: 12px; fill: #475569; }
      .albl { font-size: 13px; fill: #4c1d95; font-weight: 600; }
      .title { font-size: 24px; fill: #0f172a; font-weight: 700; }
      .legtxt { font-size: 13px; fill: #334155; }
      .edge { stroke: #64748b; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="1580" fill="#ffffff"/>
  <text x="600" y="44" text-anchor="middle" class="title">AI Factory Operations Copilot - System Architecture</text>

  <!-- Legend -->
  <g transform="translate(330,62)">
    <rect x="0" y="0" width="16" height="16" rx="3" class="io"/>
    <text x="22" y="13" class="legtxt">Input / Output</text>
    <rect x="150" y="0" width="16" height="16" rx="3" class="det"/>
    <text x="172" y="13" class="legtxt">Deterministic engine</text>
    <rect x="330" y="0" width="16" height="16" rx="3" class="llm"/>
    <text x="352" y="13" class="legtxt">LLM agent</text>
    <rect x="470" y="0" width="16" height="16" rx="3" class="intel"/>
    <text x="492" y="13" class="legtxt">Aggregation</text>
  </g>

  <!-- Vertical edges (drawn first, behind boxes) -->
  <g class="edge" marker-end="url(#arrow)">
    <line x1="600" y1="158" x2="600" y2="186"/>
    <line x1="600" y1="246" x2="600" y2="274"/>
    <line x1="600" y1="334" x2="600" y2="362"/>
    <line x1="600" y1="422" x2="600" y2="450"/>
    <line x1="600" y1="510" x2="600" y2="540"/>
    <line x1="600" y1="708" x2="600" y2="736"/>
    <line x1="600" y1="796" x2="600" y2="824"/>
    <line x1="600" y1="884" x2="600" y2="912"/>
    <line x1="600" y1="972" x2="600" y2="1000"/>
    <line x1="600" y1="1060" x2="600" y2="1088"/>
    <line x1="600" y1="1148" x2="600" y2="1176"/>
    <line x1="600" y1="1236" x2="600" y2="1264"/>
    <line x1="600" y1="1324" x2="600" y2="1352"/>
  </g>

  <!-- 1. Input -->
  <rect x="400" y="102" width="400" height="56" rx="12" class="stage io"/>
  <text x="600" y="126" text-anchor="middle" class="lbl">Synthetic Dataset v3 / Live Alerts</text>
  <text x="600" y="146" text-anchor="middle" class="sub">batch incidents or Prometheus-style alerts</text>

  <!-- 2. Preprocessor -->
  <rect x="400" y="190" width="400" height="56" rx="12" class="stage det"/>
  <text x="600" y="214" text-anchor="middle" class="lbl">Incident Preprocessor</text>
  <text x="600" y="234" text-anchor="middle" class="sub">strips labels for inference</text>

  <!-- 3. Correlation -->
  <rect x="400" y="278" width="400" height="56" rx="12" class="stage det"/>
  <text x="600" y="302" text-anchor="middle" class="lbl">Correlation Engine</text>
  <text x="600" y="322" text-anchor="middle" class="sub">compact multi-source context</text>

  <!-- 4. Classification -->
  <rect x="400" y="366" width="400" height="56" rx="12" class="stage det"/>
  <text x="600" y="390" text-anchor="middle" class="lbl">Classification Engine</text>
  <text x="600" y="410" text-anchor="middle" class="sub">incident_type, team, severity cap</text>

  <!-- 5. Router -->
  <rect x="400" y="454" width="400" height="56" rx="12" class="stage router"/>
  <text x="600" y="478" text-anchor="middle" class="lbl">Domain Agent Router</text>
  <text x="600" y="498" text-anchor="middle" class="sub">selects one specialist by incident_type</text>

  <!-- Agents container -->
  <rect x="70" y="540" width="1060" height="158" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-dasharray="6 5" stroke-width="2"/>
  <text x="600" y="562" text-anchor="middle" class="albl">Domain Agents (LLM): exactly one is invoked per incident</text>

  <!-- Agent row 1 -->
  <g>
    <rect x="95" y="576" width="245" height="46" rx="10" class="stage llm"/>
    <text x="217" y="604" text-anchor="middle" class="albl">Cooling Agent</text>
    <rect x="352" y="576" width="245" height="46" rx="10" class="stage llm"/>
    <text x="474" y="604" text-anchor="middle" class="albl">Power Agent</text>
    <rect x="609" y="576" width="245" height="46" rx="10" class="stage llm"/>
    <text x="731" y="604" text-anchor="middle" class="albl">Security Agent</text>
    <rect x="866" y="576" width="245" height="46" rx="10" class="stage llm"/>
    <text x="988" y="604" text-anchor="middle" class="albl">Network Agent</text>
  </g>
  <!-- Agent row 2 -->
  <g>
    <rect x="95" y="634" width="245" height="46" rx="10" class="stage llm"/>
    <text x="217" y="662" text-anchor="middle" class="albl">Storage Agent</text>
    <rect x="352" y="634" width="245" height="46" rx="10" class="stage llm"/>
    <text x="474" y="662" text-anchor="middle" class="albl">Environmental Agent</text>
    <rect x="609" y="634" width="245" height="46" rx="10" class="stage llm"/>
    <text x="731" y="662" text-anchor="middle" class="albl">Hardware Agent</text>
    <rect x="866" y="634" width="245" height="46" rx="10" class="stage llm"/>
    <text x="988" y="662" text-anchor="middle" class="albl">General Agent</text>
  </g>

  <!-- 6. Validation -->
  <rect x="400" y="740" width="400" height="56" rx="12" class="stage det"/>
  <text x="600" y="764" text-anchor="middle" class="lbl">Validation Engine</text>
  <text x="600" y="784" text-anchor="middle" class="sub">enforces deterministic classification</text>

  <!-- 7. Forecast -->
  <rect x="400" y="828" width="400" height="56" rx="12" class="stage det"/>
  <text x="600" y="852" text-anchor="middle" class="lbl">Forecast Engine</text>
  <text x="600" y="872" text-anchor="middle" class="sub">15 / 30 / 60-minute risk timeline</text>

  <!-- 8. Cascade -->
  <rect x="400" y="916" width="400" height="56" rx="12" class="stage det"/>
  <text x="600" y="940" text-anchor="middle" class="lbl">Failure Cascade Engine</text>
  <text x="600" y="960" text-anchor="middle" class="sub">failure propagation chain</text>

  <!-- 9. SLA -->
  <rect x="400" y="1004" width="400" height="56" rx="12" class="stage det"/>
  <text x="600" y="1028" text-anchor="middle" class="lbl">SLA Engine</text>
  <text x="600" y="1048" text-anchor="middle" class="sub">tier, SLA clock, automation policy</text>

  <!-- 10. Incident Intelligence -->
  <rect x="400" y="1092" width="400" height="56" rx="12" class="stage intel"/>
  <text x="600" y="1116" text-anchor="middle" class="lbl">Incident Intelligence</text>
  <text x="600" y="1136" text-anchor="middle" class="sub">fully analyzed incident record</text>

  <!-- 11. Commander Engine -->
  <rect x="400" y="1180" width="400" height="56" rx="12" class="stage det"/>
  <text x="600" y="1204" text-anchor="middle" class="lbl">Commander Engine</text>
  <text x="600" y="1224" text-anchor="middle" class="sub">multi-incident aggregation</text>

  <!-- 12. Executive Commander Agent -->
  <rect x="400" y="1268" width="400" height="56" rx="12" class="stage llm"/>
  <text x="600" y="1292" text-anchor="middle" class="lbl">Executive Commander Agent</text>
  <text x="600" y="1312" text-anchor="middle" class="sub">LLM situation report + automation approval</text>

  <!-- 13. Report -->
  <rect x="400" y="1356" width="400" height="56" rx="12" class="stage io"/>
  <text x="600" y="1380" text-anchor="middle" class="lbl">Executive Incident Report</text>
  <text x="600" y="1400" text-anchor="middle" class="sub">leadership-ready operational picture</text>

  <!-- Fleet-level side note -->
  <g transform="translate(70,1450)">
    <rect x="0" y="0" width="1060" height="96" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="20" y="30" class="lbl">Fleet-level engines (exposed via API)</text>
    <text x="20" y="56" class="sub">Risk Engine: site risk summary across incidents  (GET /risk_summary)</text>
    <text x="20" y="78" class="sub">Cluster Engine: groups incidents by suspected common cause  (GET /incident_clusters)</text>
  </g>
</svg>
